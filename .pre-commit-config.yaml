# Optional local git hooks that mirror the CI quality gates.
#   pre-commit install          # enable on this clone
#   pre-commit run --all-files  # run against the whole tree
#
# Formatting is intentionally NOT enforced here (the source uses deliberate
# comment alignment); run `make format` explicitly if you want ruff to reflow.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        files: ^(shared|server)/
        additional_dependencies: ["pydantic>=2.6"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
