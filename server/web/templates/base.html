<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SRP{% endblock %}</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel-2: #1c2128; --line: #2d333b;
    --text: #e6edf3; --muted: #8b949e; --accent: #4493f8;
    --good: #3fb950; --warn: #d29922; --high: #db6d28; --bad: #f85149; --na: #6e7681;
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header.top {
    display: flex; align-items: baseline; gap: 16px;
    padding: 18px 28px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
  }
  header.top .brand { font-weight: 700; font-size: 19px; letter-spacing: .5px; }
  header.top .brand span { color: var(--accent); }
  header.top .sub { color: var(--muted); font-size: 13px; }
  main { padding: 24px 28px; max-width: 1180px; margin: 0 auto; }
  h1, h2 { font-weight: 650; letter-spacing: .2px; }
  h2 { font-size: 15px; text-transform: uppercase; color: var(--muted);
       letter-spacing: 1px; margin: 28px 0 12px; }
  .muted { color: var(--muted); }
  .mono { font-family: var(--mono); }

  .cards { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 18px; min-width: 120px;
  }
  .stat .n { font-size: 26px; font-weight: 700; font-family: var(--mono); }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase;
             letter-spacing: .8px; }

  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase;
       letter-spacing: .6px; font-weight: 600; }
  tbody tr { transition: background .12s ease; }
  tbody tr:hover { background: var(--panel-2); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-weight: 700; font-size: 13px;
    padding: 3px 9px; border-radius: 6px; border: 1px solid transparent;
  }
  .chip.good { color: var(--good); background: rgba(63,185,80,.10); border-color: rgba(63,185,80,.30); }
  .chip.warn { color: var(--warn); background: rgba(210,153,34,.10); border-color: rgba(210,153,34,.30); }
  .chip.high { color: var(--high); background: rgba(219,109,40,.12); border-color: rgba(219,109,40,.35); }
  .chip.bad  { color: var(--bad);  background: rgba(248,81,73,.12);  border-color: rgba(248,81,73,.35); }
  .chip.na   { color: var(--na);   background: rgba(110,118,129,.10); border-color: rgba(110,118,129,.30); }

  .scoregrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .scorecard {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; position: relative; overflow: hidden;
  }
  .scorecard .lab { color: var(--muted); font-size: 12px; text-transform: uppercase;
                    letter-spacing: .8px; }
  .scorecard .val { font-size: 40px; font-weight: 750; font-family: var(--mono);
                    line-height: 1.1; margin-top: 4px; }
  .scorecard .bar { height: 4px; border-radius: 3px; margin-top: 12px; background: var(--line); }
  .scorecard .bar > i { display: block; height: 100%; border-radius: 3px; }
  .val.good, .bar.good > i { color: var(--good); background: var(--good); }
  .val.warn, .bar.warn > i { color: var(--warn); background: var(--warn); }
  .val.high, .bar.high > i { color: var(--high); background: var(--high); }
  .val.bad,  .bar.bad  > i { color: var(--bad);  background: var(--bad); }
  .val.na,   .bar.na   > i { color: var(--na);   background: var(--na); }

  .riskrow {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 10px;
  }
  .riskrow .head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .riskrow .name { font-weight: 650; }
  .riskbar { height: 8px; border-radius: 5px; background: var(--line); margin: 10px 0 6px; }
  .riskbar > i { display: block; height: 100%; border-radius: 5px; }
  .riskbar.good > i { background: var(--good); }
  .riskbar.warn > i { background: var(--warn); }
  .riskbar.high > i { background: var(--high); }
  .riskbar.bad  > i { background: var(--bad); }
  .factors { list-style: none; margin: 8px 0 0; padding: 0; font-size: 13px; }
  .factors li { display: flex; justify-content: space-between; padding: 3px 0;
                border-top: 1px dotted var(--line); color: var(--muted); }
  .factors li .w { font-family: var(--mono); }
  .w.pos { color: var(--bad); }
  .w.neg { color: var(--good); }

  .pill { font-size: 11px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--line);
          color: var(--muted); }
  details > summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  .small { font-size: 13px; }
  code { font-family: var(--mono); background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<header class="top">
  <div class="brand">SRP <span>//</span> раннее предупреждение отказов</div>
  <div class="sub">{% block subtitle %}{% endblock %}</div>
  <div class="sub" style="margin-left:auto"><a href="/">флот</a> · <a href="/api/v1/devices">API</a></div>
</header>
<main>
{% block body %}{% endblock %}
</main>
</body>
</html>
